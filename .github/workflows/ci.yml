name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-api:
    name: Validate API Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements.txt

      - name: Check API syntax
        run: |
          python -m py_compile services/api/app.py

  validate-worker:
    name: Validate Worker Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Worker dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/worker/requirements.txt

      - name: Check Worker syntax
        run: |
          python -m py_compile services/worker/worker.py

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - validate-api
      - validate-worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build -t local-microservices-api:ci ./services/api

      - name: Build Worker Docker image
        run: |
          docker build -t local-microservices-worker:ci ./services/worker

  validate-kubernetes:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    needs:
      - docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Kubernetes manifests
        run: |
          kubectl apply --dry-run=client -f kubernetes/namespace.yaml
          kubectl apply --dry-run=client -f kubernetes/redis.yaml
          kubectl apply --dry-run=client -f kubernetes/api-deployment.yaml
          kubectl apply --dry-run=client -f kubernetes/api-service.yaml
          kubectl apply --dry-run=client -f kubernetes/worker-deployment.yaml