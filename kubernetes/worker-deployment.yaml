apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: microservices-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      containers:
        - name: worker-service
          image: local-microservices-worker:local
          imagePullPolicy: Never
          env:
            - name: REDIS_HOST
              value: redis